# Device Name
CONFIG_ZMK_KEYBOARD_NAME="ak34"

# Studio Support
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Power Management (Enables the Soft Off behavior)
CONFIG_ZMK_PM_SOFT_OFF=y

# Encoder Support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Pin Fixes for XIAO nRF52840
CONFIG_NFCT_PINS_AS_GPIOS=y

# Bluetooth Bond Management (Set to 'n' once you are paired)
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y
