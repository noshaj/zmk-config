# Enable ZMK Studio for real-time keymap editing


# Enable the Rotary Encoder driver
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Optional: Increase Bluetooth signal strength
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Disable the requirement to press an unlock button for ZMK Studio
CONFIG_ZMK_STUDIO_LOCKING=n
