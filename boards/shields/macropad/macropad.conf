# Device Name
CONFIG_ZMK_KEYBOARD_NAME="ak34"
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y

# Studio and Locking
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Power Management & Soft Off (Sleep/Wake)
CONFIG_ZMK_PM_SOFT_OFF=y

# Encoder Support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Pin Fixes for XIAO nRF52840
CONFIG_NFCT_PINS_AS_GPIOS=y

# Enable LEDs
CONFIG_ZMK_LED=y
# Optional: Use the LED to indicate Bluetooth state
CONFIG_ZMK_BLE_SELECT_REPORT_INTERVAL=y
